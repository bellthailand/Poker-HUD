<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker HUD Analyzer - Ultimate Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* เพิ่ม Animation เล็กน้อยเพื่อให้ดูทันสมัย */
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center py-12 px-4 font-sans">
  
  <div class="max-w-3xl w-full space-y-8 bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800">
    
    <div class="text-center space-y-2">
      <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 tracking-tighter">
        POKER HUD ANALYZER
      </h1>
      <div class="flex justify-center items-center gap-2">
        <span class="h-px w-8 bg-slate-700"></span>
        <p class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em]">Professional Intelligence</p>
        <span class="h-px w-8 bg-slate-700"></span>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
      <div class="space-y-1.5">
        <label class="text-xs font-bold text-emerald-500 uppercase tracking-widest ml-1">VPIP (%)</label>
        <input type="number" id="vpip" step="0.1" class="block w-full rounded-2xl bg-slate-950 border border-slate-700 py-4 px-5 text-slate-100 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all outline-none text-lg font-mono" placeholder="0.0">
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-bold text-emerald-500 uppercase tracking-widest ml-1">PFR (%)</label>
        <input type="number" id="pfr" step="0.1" class="block w-full rounded-2xl bg-slate-950 border border-slate-700 py-4 px-5 text-slate-100 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all outline-none text-lg font-mono" placeholder="0.0">
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-bold text-emerald-500 uppercase tracking-widest ml-1">ATS (%)</label>
        <input type="number" id="ats" step="0.1" class="block w-full rounded-2xl bg-slate-950 border border-slate-700 py-4 px-5 text-slate-100 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all outline-none text-lg font-mono" placeholder="0.0">
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-bold text-emerald-500 uppercase tracking-widest ml-1">3BET (%)</label>
        <input type="number" id="threeBet" step="0.1" class="block w-full rounded-2xl bg-slate-950 border border-slate-700 py-4 px-5 text-slate-100 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all outline-none text-lg font-mono" placeholder="0.0">
      </div>
    </div>

    <button onclick="analyzeOpponent()" class="w-full py-5 rounded-2xl text-xl font-black text-white bg-gradient-to-br from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 active:scale-[0.98] transition-all shadow-xl shadow-emerald-900/20 border border-emerald-400/20">
      ANALYZE PLAYER
    </button>

    <div id="resultSection" class="hidden space-y-6 fade-in">
      <hr class="border-slate-800">
      
      <div class="bg-slate-800/40 rounded-2xl p-6 border border-emerald-500/30 shadow-xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1.5 h-full bg-emerald-500"></div>
        <h3 class="text-xs font-black text-emerald-400 uppercase tracking-[0.2em] mb-3">สรุปสไตล์การเล่น</h3>
        <p id="summaryText" class="text-slate-100 text-xl font-bold leading-tight"></p>
      </div>

      <div class="bg-slate-800/40 rounded-2xl p-6 border border-amber-500/30 shadow-xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1.5 h-full bg-amber-500"></div>
        <h3 class="text-xs font-black text-amber-400 uppercase tracking-[0.2em] mb-3">วิธีรับมือ (Strategy)</h3>
        <p id="counterText" class="text-slate-200 text-base leading-relaxed whitespace-pre-line font-medium"></p>
      </div>
    </div>

  </div>

  <script>
    function analyzeOpponent() {
      // ดึงค่าและล้างช่องว่าง
      const v = parseFloat(document.getElementById('vpip').value);
      const p = parseFloat(document.getElementById('pfr').value);
      const a = parseFloat(document.getElementById('ats').value);
      const t = parseFloat(document.getElementById('threeBet').value);

      // 1. Validation: ตรวจสอบความถูกต้องของข้อมูล
      if (isNaN(v) || isNaN(p) || isNaN(a) || isNaN(t)) {
        alert("⚠️ กรุณากรอกตัวเลขให้ครบทุกช่องก่อนวิเคราะห์");
        return;
      }
      if (v < 0 || v > 100 || p < 0 || p > 100 || a < 0 || a > 100 || t < 0 || t > 100) {
        alert("⚠️ ตัวเลขต้องอยู่ระหว่าง 0 - 100 เท่านั้น");
        return;
      }

      let summary = "";
      let counter = "";

      // 2. Condition A: การวิเคราะห์สไตล์หลัก (อัปเดตล่าสุด)
      if (v <= 15 && p <= 15) {
        summary = "สไตล์มนุษย์หิน (Nit/Rock) ระวังภัย เล่นแต่ไพ่ชัวร์";
        counter = "วิธีรับมือ: รอดักกินชิปเขาจังหวะเขาอยู่ในตำแหน่ง BB เพราะเขาจะยอมทิ้งบลายด์ง่ายๆ แต่ถ้าเขาเป็นฝ่ายเปิด Raise หรือ 3BET มา ให้หมอบทันทีถ้าไม่มีไพ่พรีเมียม";
      } 
      else if (v > 15 && v <= 25 && p >= 12) {
        summary = "สไตล์เสือซุ่ม (Tight Aggressive) เล่นเป็นระบบ ดุดันแบบมีเหตุผล";
        counter = "วิธีรับมือ: อย่าบลัฟสุ่มสี่สุ่มห้า ให้เคารพการ Raise ของเขา และรอจังหวะดักคอลเมื่อเรามีไพ่ Top Pair ที่แข็งแกร่ง";
      } 
      else if (v >= 30 && p <= 18) {
        summary = "สไตล์ปลาวาฬ (Loose Passive) ชอบดูฟล็อป คอลเก่ง หมอบไม่ค่อยเป็น";
        counter = "วิธีรับมือ: ห้ามบลัฟเด็ดขาด! รอให้เราฮิตไพ่ใหญ่ๆ (Top Pair ขึ้นไป) แล้วยิง Value Bet หนักๆ รีดชิปให้หมด";
      } 
      else if (v >= 26 && p > 18 && p <= 24) {
        summary = "สไตล์ดุดันแบบกว้าง (Loose Aggressive) เล่นไพ่เยอะและชอบเป็นคนคุมเกม";
        counter = "วิธีรับมือ: เขาเล่นไพ่กว้างมาก อย่าพยายามบลัฟสู้ ให้รอไพ่ที่มีมูลค่าสูง (Value) แล้วดักคอล หรือ 3-Bet สวนเพื่อต้อนให้เขาหมอบ";
      } 
      else if (v >= 30 && p >= 25) {
        summary = "สไตล์หมาบ้า (Maniac / LAG) ดันชิปมั่ว ปล้นทุกตา บลัฟกระจาย";
        counter = "วิธีรับมือ: ปล่อยให้เขายิงบลัฟเข้ามาเอง รอไพ่ใหญ่ (AQ+, TT+) แล้วใช้จังหวะ Check-Raise หรือ 4-Bet สวนกลับให้หน้าหงาย";
      } 
      else {
        summary = "สไตล์ก้ำกึ่ง (Mixed/Unknown) ผู้เล่นมีสถิติที่คาดเดายาก";
        counter = "วิธีรับมือ: เล่นด้วยไพ่พื้นฐาน (ABC Poker) และเน้นสังเกตพฤติกรรมหน้างานประกอบ";
      }

      // 3. Condition C (ส่วนที่ 1): 3-BET ฉายา
      if (t >= 12) summary += " | พ่วงฉายา 'เครื่องจักร 3-BET'";

      // 4. Condition B & C (ส่วนที่ 2): วิธีรับมือเพิ่มเติม
      const details = [];
      
      // สถิติการขโมยบลายด์ (ATS)
      if (a >= 45) details.push("🎯 คำเตือน: คนนี้เป็นจอมโจรขโมยบลายด์ ให้ 3-Bet สวนเวลาเขา Raise จากตำแหน่งท้ายๆ (BTN/CO)");
      else if (a <= 15) details.push("🛡️ หมายเหตุ: คนนี้ไม่ค่อยปล้นบลายด์ ถ้าเขา Raise จากตำแหน่งท้าย แปลว่ามีของจริง");

      // สถิติการเกทับ (3BET)
      if (t >= 12) details.push("⚡ เขา 3-Bet กว้างมาก รับมือด้วยการ 4-Bet สวนเมื่อมีไพ่ดี หรือใช้การ Trap ดักกิน");
      else if (t <= 4) details.push("💎 ถ้าเขา 3-Bet มา ให้สันนิษฐานว่าเขาถือไพ่ระดับท็อป (QQ+, AK) เท่านั้น หมอบได้ควรหมอบ");

      if (details.length > 0) {
        counter += "\n\n" + details.join("\n");
      }

      // 5. แสดงผลลัพธ์
      document.getElementById('summaryText').innerText = summary;
      document.getElementById('counterText').innerText = counter;
      
      const resultBox = document.getElementById('resultSection');
      resultBox.classList.remove('hidden');
      
      // เลื่อนหน้าจอลงมาที่ผลลัพธ์อัตโนมัติ
      window.scrollTo({ top: resultBox.offsetTop, behavior: 'smooth' });
    }
  </script>
</body>
</html>
