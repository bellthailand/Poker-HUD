<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker HUD Analyzer - Official</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center py-8 px-4 font-sans">
  
  <div class="max-w-md w-full space-y-6 bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl border border-slate-800">
    
    <div class="text-center space-y-1">
      <h1 class="text-2xl font-black text-white tracking-tighter italic">
        POKER <span class="text-emerald-500">HUD</span> ANALYZER
      </h1>
      <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">Justin Intelligence System</p>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="space-y-1">
        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">VPIP %</label>
        <input type="number" id="vpip" step="0.1" class="w-full rounded-2xl bg-black border border-slate-800 p-4 text-emerald-400 focus:border-emerald-500 outline-none text-center font-mono text-xl" placeholder="0.0">
      </div>
      <div class="space-y-1">
        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">PFR %</label>
        <input type="number" id="pfr" step="0.1" class="w-full rounded-2xl bg-black border border-slate-800 p-4 text-emerald-400 focus:border-emerald-500 outline-none text-center font-mono text-xl" placeholder="0.0">
      </div>
      <div class="space-y-1">
        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">ATS %</label>
        <input type="number" id="ats" step="0.1" class="w-full rounded-2xl bg-black border border-slate-800 p-4 text-emerald-400 focus:border-emerald-500 outline-none text-center font-mono text-xl" placeholder="0.0">
      </div>
      <div class="space-y-1">
        <label class="text-[10px] font-black text-slate-500 uppercase ml-2">3BET %</label>
        <input type="number" id="threeBet" step="0.1" class="w-full rounded-2xl bg-black border border-slate-800 p-4 text-emerald-400 focus:border-emerald-500 outline-none text-center font-mono text-xl" placeholder="0.0">
      </div>
    </div>

    <button onclick="run()" class="w-full py-5 rounded-2xl text-lg font-black text-black bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition-all shadow-lg shadow-emerald-500/20">
      วิเคราะห์คู่ต่อสู้
    </button>

    <div id="res" class="hidden space-y-4 fade-in">
      <div class="bg-slate-800/40 p-5 rounded-2xl border-l-4 border-emerald-500">
        <h3 class="text-[10px] font-black text-emerald-400 uppercase tracking-widest mb-1">ผลสรุป</h3>
        <p id="sTxt" class="text-white text-lg font-bold leading-tight"></p>
      </div>
      <div class="bg-slate-800/40 p-5 rounded-2xl border-l-4 border-amber-500">
        <h3 class="text-[10px] font-black text-amber-400 uppercase tracking-widest mb-1">กลยุทธ์</h3>
        <p id="cTxt" class="text-slate-300 text-sm leading-relaxed whitespace-pre-line font-medium"></p>
      </div>
    </div>
  </div>

  <script>
    function run() {
      const v = parseFloat(document.getElementById('vpip').value);
      const p = parseFloat(document.getElementById('pfr').value);
      const a = parseFloat(document.getElementById('ats').value);
      const t = parseFloat(document.getElementById('threeBet').value);

      if ([v, p, a, t].some(isNaN)) { alert("กรุณากรอกข้อมูลให้ครบ"); return; }

      let s = ""; let c = "";

      // Logic A: Playstyle (อัปเดตตามคำสั่งล่าสุดเป๊ะๆ)
      if (v <= 15 && p <= 15) {
        s = "สไตล์มนุษย์หิน (Nit/Rock) ระวังภัย เล่นแต่ไพ่ชัวร์";
        c = "วิธีรับมือ: รอดักกินชิปเขาจังหวะเขาอยู่ในตำแหน่ง BB เพราะเขาจะยอมทิ้งบลายด์ง่ายๆ แต่ถ้าเขาเปิด Raise/3BET มา ให้หมอบทันทีถ้าไม่มีไพ่พรีเมียม";
      } else if (v > 15 && v <= 25 && p >= 12) {
        s = "สไตล์เสือซุ่ม (Tight Aggressive) เล่นเป็นระบบ ดุดันแบบมีเหตุผล";
        c = "วิธีรับมือ: อย่าบลัฟสุ่มสี่สุ่มห้า ให้เคารพการ Raise ของเขา และรอจังหวะดักคอลเมื่อเรามีไพ่ Top Pair ที่แข็งแกร่ง";
      } else if (v >= 30 && p <= 18) {
        s = "สไตล์ปลาวาฬ (Loose Passive) ชอบดูฟล็อป คอลเก่ง หมอบไม่ค่อยเป็น";
        c = "วิธีรับมือ: ห้ามบลัฟเด็ดขาด! รอให้เราฮิตไพ่ใหญ่ๆ แล้วยิง Value Bet หนักๆ รีดชิปให้หมด";
      } else if (v >= 26 && p > 18 && p <= 24) {
        s = "สไตล์ดุดันแบบกว้าง (Loose Aggressive) เล่นไพ่เยอะและชอบเป็นคนคุมเกม";
        c = "วิธีรับมือ: เขาเล่นไพ่กว้างมาก อย่าพยายามบลัฟสู้ ให้รอไพ่ที่มีมูลค่าสูง (Value) แล้วดักคอล หรือ 3-Bet สวนเพื่อบีบให้เขาหมอบ";
      } else if (v >= 30 && p >= 25) {
        s = "สไตล์หมาบ้า (Maniac / LAG) ดันชิปมั่ว ปล้นทุกตา บลัฟกระจาย";
        c = "วิธีรับมือ: ปล่อยให้เขายิงบลัฟเข้ามาเอง รอไพ่ใหญ่ (AQ+, TT+) แล้วใช้จังหวะ Check-Raise หรือ 4-Bet สวนกลับ";
      } else {
        s = "สไตล์ก้ำกึ่ง (Mixed/Unknown)";
        c = "วิธีรับมือ: เล่นด้วยไพ่พื้นฐาน (ABC Poker) และสังเกตพฤติกรรมเพิ่มเติม";
      }

      if (t >= 12) s += " | เครื่องจักร 3-BET";

      const ex = [];
      if (a >= 45) ex.push("🎯 จอมโจรขโมยบลายด์: ให้ 3-Bet สวนเวลาเขา Raise จากตำแหน่ง BTN/CO");
      else if (a <= 15) ex.push("🛡️ ไม่ค่อยปล้นบลายด์: ถ้าเขา Raise จากตำแหน่งท้าย แปลว่าของจริง");
      if (t >= 12) ex.push("⚡ 3-Bet กว้างมาก: รับมือด้วยการ 4-Bet สวนเมื่อมีไพ่ดี หรือ Trap ดักกิน");
      else if (t <= 4) ex.push("💎 3-Bet แคบมาก: เขาถือตัวท็อป (QQ+, AK) แน่นอน หมอบได้หมอบ");

      if (ex.length > 0) c += "\n\n" + ex.join("\n");

      document.getElementById('sTxt').innerText = s;
      document.getElementById('cTxt').innerText = c;
      document.getElementById('res').classList.remove('hidden');
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
  </script>
</body>
</html>
